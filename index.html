<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodsetLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f2ec;
      --ink: #1a1814;
      --ink-muted: #6b6560;
      --accent: #c8401a;
      --rule: #d9d4cc;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Top rule */
    .top-rule {
      width: 100%;
      height: 3px;
      background: var(--ink);
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
      animation-delay: 0.1s;
    }

    .top-rule-thin {
      width: 100%;
      height: 1px;
      background: var(--rule);
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
      animation-delay: 0.15s;
      margin-top: 3px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 28px 48px 24px;
      opacity: 0;
      animation: fadeIn 0.7s ease forwards;
      animation-delay: 0.3s;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    /* Horizontal rule under header */
    .header-rule {
      width: calc(100% - 96px);
      margin: 0 48px;
      height: 1px;
      background: var(--rule);
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
      animation-delay: 0.4s;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px;
      position: relative;
    }

    .content {
      max-width: 680px;
    }

    .eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      opacity: 0;
      animation: slideUp 0.7s ease forwards;
      animation-delay: 0.6s;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 7vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 40px;
      opacity: 0;
      animation: slideUp 0.8s ease forwards;
      animation-delay: 0.75s;
    }

    .headline .period {
      color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--ink);
      margin-bottom: 28px;
      opacity: 0;
      animation: expandWidth 0.6s ease forwards;
      animation-delay: 1s;
    }

    .subline {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      line-height: 1.9;
      opacity: 0;
      animation: slideUp 0.7s ease forwards;
      animation-delay: 1.1s;
    }

    /* Vertical label on right side */
    .vertical-label {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center center;
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--rule);
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.4s;
    }

    /* Footer */
    footer {
      padding: 24px 48px 32px;
      opacity: 0;
      animation: fadeIn 0.7s ease forwards;
      animation-delay: 1.2s;
    }

    .footer-rule {
      width: 100%;
      height: 1px;
      background: var(--rule);
      margin-bottom: 20px;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .github-link {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 1px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .github-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    /* Decorative corner mark */
    .corner-mark {
      position: fixed;
      bottom: 32px;
      left: 48px;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: var(--rule);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.5s;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes expandWidth {
      from {
        opacity: 0;
        width: 0;
      }
      to {
        opacity: 1;
        width: 40px;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      header, .header-rule, main, footer {
        padding-left: 28px;
        padding-right: 28px;
      }
      .header-rule {
        width: calc(100% - 56px);
        margin: 0 28px;
      }
      .vertical-label {
        display: none;
      }
      .corner-mark {
        left: 28px;
      }
    }
  </style>
</head>
<body>

  <div class="top-rule"></div>
  <div class="top-rule-thin"></div>

  <header>
    <a class="logo" href="#">PodsetLab</a>

  </header>

  <div class="header-rule"></div>

  <main>
    <div class="content">
      <p class="eyebrow">In development</p>
      <h1 class="headline">
        Build<span class="period">.</span><br>
        Own<span class="period">.</span><br>
        Maintain<span class="period">.</span>
      </h1>
      <div class="divider"></div>
      <p class="subline">
        Software and infrastructure.
      </p>
    </div>
    <span class="vertical-label">podsetlab.com — active</span>
  </main>

  <footer>
    <div class="footer-rule"></div>
    <div class="footer-inner">
      <span class="footer-left"></span>
      <div class="footer-right">
        <div class="status-dot"></div>
        <a class="github-link" href="https://github.com/podsetlab" target="_blank" rel="noopener">GitHub →</a>
      </div>
    </div>
  </footer>

</body>
</html>
